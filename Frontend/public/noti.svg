<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bell-body { fill: var(--color-background-secondary); stroke: var(--color-border-primary); }
        .bell-clapper { fill: var(--color-text-primary); }
        .dot { fill: var(--color-danger); }
      }
    </style>
  </defs>

  <!-- Bell body -->
  <path d="M 300 80 Q 280 60 280 40 Q 280 20 300 20 Q 320 20 320 40 Q 320 60 300 80" 
        class="bell-body" stroke="var(--color-border-primary)" stroke-width="1.5" fill="var(--color-background-secondary)"/>

  <!-- Bell curve -->
  <path d="M 280 80 Q 260 100 260 130 Q 260 150 280 160 L 320 160 Q 340 150 340 130 Q 340 100 320 80" 
        class="bell-body" stroke="var(--color-border-primary)" stroke-width="1.5"/>

  <!-- Bell opening -->
  <ellipse cx="300" cy="160" rx="20" ry="8" class="bell-body" stroke="var(--color-border-primary)" stroke-width="1.5"/>

  <!-- Clapper inside -->
  <line x1="300" y1="120" x2="300" y2="148" stroke="var(--color-text-primary)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="300" cy="152" r="3" class="bell-clapper"/>

  <!-- Notification dot -->
  <circle cx="335" cy="35" r="12" class="dot" fill="var(--color-danger)"/>
  <text x="335" y="41" class="t" text-anchor="middle" fill="white" font-weight="500">3</text>

  <!-- Wobble lines (motion) -->
  <path d="M 250 50 Q 245 45 240 50" stroke="var(--color-text-secondary)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 350 50 Q 355 45 360 50" stroke="var(--color-text-secondary)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 235 80 Q 225 80 230 90" stroke="var(--color-text-secondary)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>